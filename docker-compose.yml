services:
  db:
    image: postgres:16-alpine
    container_name: coding_automation_db
    environment:
      POSTGRES_DB: agentdb
      POSTGRES_USER: agentuser
      POSTGRES_PASSWORD: agentpass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentuser -d agentdb"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: coding_automation_backend
    env_file:
      - ./Backend/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: agentdb
      POSTGRES_USER: agentuser
      POSTGRES_PASSWORD: agentpass
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
